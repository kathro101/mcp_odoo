<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Odoo — AI Agent</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MCP Odoo <span class="subtitle">AI Agent</span></h1>
            <button id="btnModels" class="btn-secondary">📋 Models</button>
            <button id="btnAgents" class="btn-secondary">🤖 Agents</button>
            <button id="btnClear" class="btn-secondary">🔄 New Chat</button>
        </header>

        <div id="messages" class="messages"></div>

        <form id="chatForm" class="chat-form">
            <input
                type="text"
                id="messageInput"
                placeholder="Ask about shipments, sales, invoices..."
                autocomplete="off"
                autofocus
            />
            <button type="submit" id="btnSend">Send</button>
        </form>

        <div id="status" class="status hidden"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
